# Nginx 反向代理：对接原 Vue 前端构建产物 + Go 后端
# 前端构建产物（ruoyi-ui 的 dist）挂到 /usr/share/nginx/html

server {
    listen       80;
    server_name  _;
    client_max_body_size 200m;

    # 静态前端
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # 前端开发时的代理前缀 /dev-api/* → 后端
    # 生产环境前端已把 baseURL 改为 /prod-api/ 或 /api-v1/
    location /prod-api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://backend:8092/;
    }

    # 文件上传目录直出
    location /profile/ {
        alias /data/uploadPath/;
    }
}
