# golangci-lint 配置
# 文档: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  go: "1.24"
  tests: true
  skip-dirs:
    - bin
    - tmp
    - logs

linters:
  disable-all: true
  enable:
    - errcheck      # 检查未处理的 error 返回
    - gosimple      # 简化代码建议
    - govet         # Go vet 标准检查
    - ineffassign   # 检测无效的赋值
    - staticcheck   # 综合静态分析
    - unused        # 检测未使用的代码
    - gosec         # 安全审查 (SQL 注入、硬编码密码等)
    - misspell      # 拼写检查
    - bodyclose     # HTTP body 未关闭检测
    - nilerr        # 错误使用 nil error 检测

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
    # 允许忽略错误的常见函数（已手动评估安全的）
    exclude-functions:
      - (*os.File).Close
      - (io.Closer).Close
      - fmt.Print
      - fmt.Println
      - fmt.Printf
      - fmt.Fprint
      - fmt.Fprintln
      - fmt.Fprintf

  gosec:
    excludes:
      - G104  # Errors unhandled (errcheck 已覆盖)
      - G304  # File path provided as taint input (项目已手动校验上传路径)
      - G115  # Integer overflow conversion (业务可控)

  govet:
    enable:
      - shadow

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    # 测试文件放宽
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    # stub.go 是占位文件
    - path: stub\.go
      linters:
        - unused
        - errcheck
